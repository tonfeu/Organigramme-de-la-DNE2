<!DOCTYPE html>
<html lang="fr" data-fr-scheme="system">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Organigramme De La DNE</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@gouvfr/dsfr@1.13.1/dist/dsfr/dsfr.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@gouvfr/dsfr@1.13.1/dist/utility/icons/icons.min.css">
    <link rel="stylesheet" href="./style.css">
</head>

<body>
    <header role="banner" class="fr-header">
        <div class="fr-header__body">
            <div class="fr-container">
                <div class="fr-header__body-row">
                    <div class="fr-header__brand">
                        <div class="fr-header__brand-top">
                            <div class="fr-header__logo"><p class="fr-logo">République<br>Française</p></div>
                        </div>
                        <div class="fr-header__service">
                            <a href="index.html" title="Accueil">
                                <p class="fr-header__service-title">Organigramme DNE</p>
                            </a>
                        </div>
                    </div>
                    <div class="fr-header__tools">
                        <div class="fr-header__tools-links">
                            <ul class="fr-btns-group">
                                <li><button class="fr-btn fr-icon-add-line" id="btn-show-form">Ajouter un agent</button></li>
                                <li><a class="fr-btn fr-icon-search-line" href="search.html">Annuaire</a></li>
                                <li><button class="fr-btn fr-icon-file-pdf-line" id="btn-export-pdf">Export PDF</button></li>
                            </ul>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </header>

    <main role="main">
        <div class="fr-container fr-py-4w">
            <section id="form-creation-agent" class="fr-card fr-p-4w fr-mb-4w" style="display: none; border: 1px solid var(--border-default-grey);">
                <div class="fr-card__body">
                    <h2 class="fr-h4">Nouvel Agent</h2>
                    <div class="fr-grid-row fr-grid-row--gutters">
                        <div class="fr-col-12 fr-col-md-6">
                            <div class="fr-input-group">
                                <label class="fr-label" for="field-prenom">Prénom</label>
                                <input class="fr-input" type="text" id="field-prenom">
                            </div>
                            <div class="fr-input-group">
                                <label class="fr-label" for="field-nom">Nom *</label>
                                <input class="fr-input" type="text" id="field-nom" required>
                            </div>
                        </div>
                        <div class="fr-col-12 fr-col-md-6">
                            <div class="fr-input-group">
                                <label class="fr-label" for="field-fct">Fonction</label>
                                <input class="fr-input" type="text" id="field-fct">
                            </div>
                            <div class="fr-select-group">
                                <label class="fr-label" for="field-struct">Structure *</label>
                                <select class="fr-select" id="field-struct">
                                    <option value="" disabled selected>Chargement...</option>
                                </select>
                            </div>
                        </div>
                        <div class="fr-col-12">
                            <div class="fr-input-group">
                                <label class="fr-label" for="field-formation">Formation(s)</label>
                                <textarea class="fr-input" id="field-formation" rows="2"></textarea>
                            </div>
                        </div>
                    </div>
                    <div class="fr-mt-2w">
                        <button class="fr-btn" id="btn-save">Enregistrer</button>
                        <button class="fr-btn fr-btn--secondary" id="btn-cancel">Annuler</button>
                    </div>
                </div>
            </section>

            <div id="organigramme-container">
                <p id="loading-msg" style="text-align:center;">Chargement des données Grist...</p>
            </div>
        </div>
    </main>

    <script src="https://docs.getgrist.com/grist-plugin-api.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    
    <script src="./map.js"></script>
    <script src="./app.js"></script>
</body>
</html>
