<!DOCTYPE html>
<html lang="fr" data-fr-scheme="system">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Organigramme dynamique - DNE</title>

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@gouvfr/dsfr@1.13.1/dist/dsfr/dsfr.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@gouvfr/dsfr@1.13.1/dist/utility/icons/icons.min.css">
    
    <link rel="stylesheet" href="./style.css">
</head>

<body>
    <header role="banner" class="fr-header">
        <div class="fr-header__body">
            <div class="fr-container">
                <div class="fr-header__body-row">
                    <div class="fr-header__brand fr-enlarge-link">
                        <div class="fr-header__brand-top">
                            <div class="fr-header__logo">
                                <p class="fr-logo">République<br>Française</p>
                            </div>
                        </div>
                        <div class="fr-header__service">
                            <a href="/" title="Accueil - Organigramme DNE">
                                <p class="fr-header__service-title">Organigramme de la DNE</p>
                            </a>
                        </div>
                    </div>

                    <div class="fr-header__tools">
                        <div class="fr-header__tools-links">
                            <ul class="fr-btns-group">
                                <li>
                                    <button class="fr-btn fr-btn--secondary fr-icon-download-line fr-btn--icon-left" id="btn-export-pdf">
                                        Télécharger PDF
                                    </button>
                                </li>
                            </ul>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </header>

    <main role="main" class="fr-container fr-my-4w">
        
        <section id="admin-panel" class="fr-p-3w fr-mb-4w fr-background-alt--blue-france" style="border: 1px solid var(--border-default-blue-france);">
            <div class="fr-grid-row fr-grid-row--middle">
                <div class="fr-col">
                    <h2 class="fr-h4 fr-mb-0">Gestion du Personnel</h2>
                </div>
                <div class="fr-col-auto">
                    <button class="fr-btn fr-icon-add-line fr-btn--icon-left" id="btn-show-form">
                        Nouvel Agent
                    </button>
                </div>
            </div>

            <div id="form-creation-agent" class="fr-pt-3w fr-mt-3w" style="display: none; border-top: 1px solid var(--border-default-grey);">
                <div class="fr-grid-row fr-grid-row--gutters">
                    <div class="fr-col-12 fr-col-md-6 fr-input-group">
                        <label class="fr-label" for="field-prenom">Prénom</label>
                        <input class="fr-input" id="field-prenom" type="text" placeholder="Ex: Jean">
                    </div>
                    <div class="fr-col-12 fr-col-md-6 fr-input-group">
                        <label class="fr-label" for="field-nom">Nom *</label>
                        <input class="fr-input" id="field-nom" type="text" placeholder="Ex: DUPONT" required>
                    </div>
                    <div class="fr-col-12 fr-col-md-6 fr-input-group">
                        <label class="fr-label" for="field-fct">Poste / Fonction</label>
                        <input class="fr-input" id="field-fct" type="text" placeholder="Ex: Développeur full-stack">
                    </div>
                    <div class="fr-col-12 fr-col-md-6 fr-input-group">
                        <label class="fr-label" for="field-struct">Structure d'affectation *</label>
                        <select class="fr-select" id="field-struct">
                            <option value="" disabled selected>Chargement des bureaux...</option>
                        </select>
                    </div>
                </div>
                <div class="fr-grid-row fr-grid-row--right fr-mt-3w">
                    <button class="fr-btn fr-btn--secondary fr-mr-2w" id="btn-cancel">Annuler</button>
                    <button class="fr-btn" id="btn-save">Enregistrer dans Grist</button>
                </div>
            </div>
        </section>

        <section class="fr-accordion fr-mb-4w">
            <h3 class="fr-accordion__title">
                <button class="fr-accordion__btn" aria-expanded="false" aria-controls="quick-search-area">
                    Recherche rapide / Annuaire
                </button>
            </h3>
            <div class="fr-collapse" id="quick-search-area">
                <div class="fr-grid-row fr-grid-row--gutters fr-pt-2w" style="align-items: flex-end;">
                    <div class="fr-col-12 fr-col-md-6">
                        <div class="fr-select-group">
                            <label class="fr-label" for="quick-select-structure">Filtrer par bureau</label>
                            <select class="fr-select" id="quick-select-structure">
                                <option value="">Tous les bureaux</option>
                            </select>
                        </div>
                    </div>
                    <div class="fr-col-12 fr-col-md-6">
                        <div class="fr-search-bar" role="search">
                            <label class="fr-label" for="quick-search-input">Rechercher un agent</label>
                            <input class="fr-input" placeholder="Nom, Prénom, Fonction..." type="search" id="quick-search-input">
                            <button class="fr-btn" id="quick-search-btn" title="Rechercher">Rechercher</button>
                        </div>
                    </div>
                </div>
            </div>
        </section>

        <div class="organigramme-container">
            <div class="top-zone fr-mb-6w">
                <div class="top-stack-left" id="top-left"></div>
                <div class="top-center" id="top-center"></div>
                <div class="top-stack-right" id="top-right"></div>
            </div>

            <div class="main-grid">
                <div class="column-stack" id="col-1"></div>
                <div class="column-stack" id="col-2"></div>
                <div class="column-stack" id="col-3"></div>
                <div class="column-stack" id="col-4"></div>
                <div class="column-stack" id="col-5"></div>
            </div>
        </div>

        <dialog id="info-modal" class="fr-modal" aria-labelledby="modal-title" role="dialog">
            <div class="fr-container fr-container--fluid fr-container-md">
                <div class="fr-grid-row fr-grid-row--center">
                    <div class="fr-col-12 fr-col-md-10 fr-col-lg-8">
                        <div class="fr-modal__body">
                            <div class="fr-modal__header">
                                <button class="fr-btn--close fr-btn" aria-controls="info-modal">Fermer</button>
                            </div>
                            <div class="fr-modal__content">
                                <h1 id="modal-title" class="fr-modal__title">Détails du service</h1>
                                <div id="modal-body">
                                    </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </dialog>

        <button id="dsfr-hidden-modal-btn" data-fr-opened="false" aria-controls="info-modal" style="display:none;"></button>

    </main>

    <script src="https://docs.getgrist.com/grist-plugin-api.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>

    <script type="module" src="https://cdn.jsdelivr.net/npm/@gouvfr/dsfr@1.13.1/dist/dsfr/dsfr.module.min.js"></script>

    <script src="./map.js"></script>
    <script src="./app.js"></script>

    <script type="module">
        import { initPdfExport } from './pdf-export.js';
        document.addEventListener("DOMContentLoaded", () => {
            if (typeof initPdfExport === 'function') {
                initPdfExport(() => window.getOrganigrammeData ? window.getOrganigrammeData() : null);
            }
        });
    </script>
</body>
</html>
