<!DOCTYPE html>
<html lang="fr" data-fr-scheme="system">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Annuaire DNE - Recherche d'agents</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@gouvfr/dsfr@1.13.1/dist/dsfr/dsfr.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@gouvfr/dsfr@1.13.1/dist/utility/icons/icons.min.css">
    <link rel="stylesheet" href="./style.css">
</head>

<body>
    <header role="banner" class="fr-header">
        <div class="fr-header__body">
            <div class="fr-container">
                <div class="fr-header__body-row">
                    <div class="fr-header__brand">
                        <div class="fr-header__logo"><p class="fr-logo">République<br>Française</p></div>
                        <div class="fr-header__service">
                            <a href="index.html" title="Retour à l'accueil">
                                <p class="fr-header__service-title">Annuaire DNE</p>
                            </a>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </header>

    <main role="main">
        <div class="fr-container fr-py-4w">
            <nav role="navigation" class="fr-breadcrumb" aria-label="vous êtes ici :">
                <ol class="fr-breadcrumb__list">
                    <li><a class="fr-breadcrumb__link" href="index.html">Accueil</a></li>
                    <li><a class="fr-breadcrumb__link" aria-current="page">Annuaire</a></li>
                </ol>
            </nav>

            <h1 class="fr-h2">Rechercher un agent</h1>

            <div class="fr-grid-row fr-grid-row--gutters fr-mb-4w">
                <div class="fr-col-12 fr-col-md-4">
                    <div class="fr-select-group">
                        <label class="fr-label" for="search-struct">Filtrer par structure</label>
                        <select class="fr-select" id="search-struct">
                            <option value="">Toutes les structures</option>
                        </select>
                    </div>
                </div>
                <div class="fr-col-12 fr-col-md-8">
                    <div class="fr-search-bar" id="search-bar" role="search">
                        <label class="fr-label" for="search-input">Recherche par nom, prénom ou fonction</label>
                        <input class="fr-input" placeholder="Ex: Jean Dupont..." type="search" id="search-input">
                        <button class="fr-btn" title="Rechercher" id="btn-search-trigger">Rechercher</button>
                    </div>
                </div>
            </div>

            <div id="loading-message" class="fr-alert fr-alert--info fr-mb-4w" style="display:none;">
                <p>Chargement des résultats...</p>
            </div>

            <div id="result-count" class="fr-text--sm fr-mb-2w"></div>
            <div id="search-results-area" class="fr-grid-row fr-grid-row--gutters">
                </div>
        </div>
    </main>

    <script src="https://docs.getgrist.com/grist-plugin-api.js"></script>
    <script src="./map.js"></script>
    <script src="./search.js"></script>
</body>
</html>
